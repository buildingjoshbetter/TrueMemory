<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380">
  <!-- Terminal window -->
  <rect width="820" height="380" rx="10" fill="#1e1e2e"/>
  <rect width="820" height="380" rx="10" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Title bar -->
  <rect width="820" height="36" rx="10" fill="#181825"/>
  <rect x="0" y="26" width="820" height="10" fill="#181825"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="410" y="22" text-anchor="middle" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="12" fill="#6c7086">~/.truememory — zsh</text>

  <!-- Session 1 header -->
  <text x="24" y="68" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="11" fill="#585b70" opacity="0">── Session 1 ──────────────────────────────────────────────
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.5s" fill="freeze"/>
  </text>

  <!-- User input line 1 -->
  <text x="24" y="96" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#a6e3a1">❯ </tspan><tspan fill="#cdd6f4">I prefer FastAPI, always use Pydantic v2</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
  </text>

  <!-- Store confirmation -->
  <text x="24" y="120" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#a6e3a1">✓</tspan><tspan fill="#6c7086"> Stored to ~/.truememory/memories.db</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
  </text>

  <!-- User input line 2 -->
  <text x="24" y="148" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#a6e3a1">❯ </tspan><tspan fill="#cdd6f4">Auth middleware is in src/auth/, don't touch it</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.8s" fill="freeze"/>
  </text>

  <!-- Store confirmation 2 -->
  <text x="24" y="172" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#a6e3a1">✓</tspan><tspan fill="#6c7086"> Stored. 2 memories saved locally.</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.6s" fill="freeze"/>
  </text>

  <!-- Session 2 header -->
  <text x="24" y="210" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="11" fill="#585b70" opacity="0">── Session 2 (next day) ───────────────────────────────────
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.5s" fill="freeze"/>
  </text>

  <!-- Query -->
  <text x="24" y="238" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#a6e3a1">❯ </tspan><tspan fill="#cdd6f4">What framework do I use?</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="5.2s" fill="freeze"/>
  </text>

  <!-- Recall result -->
  <text x="24" y="266" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#89b4fa">→</tspan><tspan fill="#cdd6f4"> You prefer FastAPI with Pydantic v2.</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6s" fill="freeze"/>
  </text>
  <text x="24" y="290" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" opacity="0">
    <tspan fill="#89b4fa">→</tspan><tspan fill="#cdd6f4"> Auth middleware is in src/auth/ — hands off.</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.4s" fill="freeze"/>
  </text>

  <!-- Stats line -->
  <text x="24" y="318" font-family="'Menlo', 'Monaco', 'Courier New', monospace" font-size="11" opacity="0">
    <tspan fill="#585b70">  recalled in </tspan><tspan fill="#a6e3a1">&lt;200ms</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#a6e3a1">100% local</tspan><tspan fill="#585b70"> · </tspan><tspan fill="#a6e3a1">zero cloud</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7s" fill="freeze"/>
  </text>

  <!-- Blinking cursor -->
  <rect x="24" y="340" width="8" height="16" fill="#a6e3a1">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
