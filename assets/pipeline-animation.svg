<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" width="1000" height="260">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="pulseGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="260" rx="12" fill="url(#bgGrad)"/>

  <!-- Section label -->
  <text x="500" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#475569" letter-spacing="3" font-weight="500">HOW IT WORKS</text>

  <!-- Pipeline track -->
  <line x1="80" y1="120" x2="920" y2="120" stroke="#1e293b" stroke-width="2"/>

  <!-- Layer nodes -->
  <!-- Ingest -->
  <circle cx="120" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="120" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">IN</text>
  <text x="120" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Ingest</text>

  <!-- Gate -->
  <circle cx="260" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="260" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">GATE</text>
  <text x="260" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Encoding</text>

  <!-- L0 Personality -->
  <circle cx="400" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="400" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">L0</text>
  <text x="400" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Personality</text>

  <!-- L2 Episodic -->
  <circle cx="540" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="540" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">L2</text>
  <text x="540" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Episodic</text>

  <!-- L3 Semantic -->
  <circle cx="680" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="680" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">L3</text>
  <text x="680" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Semantic</text>

  <!-- L4+L5 Salience/Consolidation -->
  <circle cx="820" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="820" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">L4</text>
  <text x="820" y="130" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="8" fill="#64748b">L5</text>
  <text x="820" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Rerank</text>

  <!-- Output -->
  <circle cx="920" cy="120" r="22" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="920" y="124" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8" font-weight="600">OUT</text>
  <text x="920" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="10" fill="#64748b">Recall</text>

  <!-- Animated pulse traveling the pipeline -->
  <circle r="6" fill="#818cf8" filter="url(#glow)" opacity="0.9">
    <animate attributeName="cx" values="120;260;400;540;680;820;920;920" dur="4s" repeatCount="indefinite" keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="cy" values="120;120;120;120;120;120;120;120" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0.9;0.9;0.9;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#22d3ee" filter="url(#glow)" opacity="0.9">
    <animate attributeName="cx" values="120;260;400;540;680;820;920;920" dur="4s" begin="1.5s" repeatCount="indefinite" keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="cy" values="120;120;120;120;120;120;120;120" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0.9;0.9;0.9;0" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="6" fill="#a78bfa" filter="url(#glow)" opacity="0.9">
    <animate attributeName="cx" values="120;260;400;540;680;820;920;920" dur="4s" begin="3s" repeatCount="indefinite" keyTimes="0;0.14;0.28;0.42;0.57;0.71;0.85;1" calcMode="spline" keySplines="0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1;0.4 0 0.2 1"/>
    <animate attributeName="cy" values="120;120;120;120;120;120;120;120" dur="4s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0.9;0.9;0.9;0.9;0" dur="4s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Node activation glow rings -->
  <circle cx="120" cy="120" r="22" fill="none" stroke="#818cf8" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.02;0.14"/>
    <animate attributeName="r" values="22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.02;0.14"/>
  </circle>
  <circle cx="260" cy="120" r="22" fill="none" stroke="#818cf8" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.16;0.28"/>
    <animate attributeName="r" values="22;22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.12;0.16;0.28"/>
  </circle>
  <circle cx="400" cy="120" r="22" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.26;0.30;0.42"/>
    <animate attributeName="r" values="22;22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.26;0.30;0.42"/>
  </circle>
  <circle cx="540" cy="120" r="22" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.40;0.44;0.57"/>
    <animate attributeName="r" values="22;22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.40;0.44;0.57"/>
  </circle>
  <circle cx="680" cy="120" r="22" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.55;0.59;0.71"/>
    <animate attributeName="r" values="22;22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.55;0.59;0.71"/>
  </circle>
  <circle cx="820" cy="120" r="22" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0">
    <animate attributeName="opacity" values="0;0;0.6;0" dur="4s" repeatCount="indefinite" keyTimes="0;0.69;0.73;0.85"/>
    <animate attributeName="r" values="22;22;30;30" dur="4s" repeatCount="indefinite" keyTimes="0;0.69;0.73;0.85"/>
  </circle>

  <!-- Bottom stats bar -->
  <line x1="80" y1="210" x2="920" y2="210" stroke="#1e293b" stroke-width="1"/>
  <text x="160" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">
    <tspan fill="#818cf8" font-weight="700">93.0%</tspan> LoCoMo
  </text>
  <text x="380" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">
    <tspan fill="#a78bfa" font-weight="700">92.0%</tspan> LongMemEval
  </text>
  <text x="620" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">
    <tspan fill="#22d3ee" font-weight="700">76.6%</tspan> BEAM-1M SOTA
  </text>
  <text x="840" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" fill="#64748b">
    <tspan fill="#94a3b8" font-weight="700">&lt;200ms</tspan> retrieval
  </text>
</svg>
